name: rem
description: "A reminder application which reminds you again and again until you finish the job."

publish_to: 'none' 
version: 1.0.2+4

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  android_alarm_manager_plus: ^5.0.0
  archive: ^4.0.9
  awesome_notifications: ^0.11.0
  double_back_to_close_app: ^2.1.0
  duration: ^4.0.3
  dynamic_color: ^1.7.0
  flutter:
    sdk: flutter
  flutter_file_dialog: ^3.0.3
  flutter_hooks: ^0.21.3+1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  flutter_slidable: ^4.0.3
  flutter_svg: ^2.2.4
  get_it: ^9.2.1
  hooks_riverpod: ^3.1.0
  intl: ^0.20.0
  logger: ^2.4.0
  objectbox: ^5.2.0
  objectbox_flutter_libs: ^5.2.0
  package_info_plus: ^9.0.0
  path: ^1.9.0
  path_provider: ^2.1.4
  random_datetime: ^1.0.4
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.1
  toastification: ^3.0.3

dev_dependencies:
  build_runner: ^2.13.1
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.0
  objectbox_generator: ^5.2.0
  riverpod_generator: ^4.0.0+1
  very_good_analysis: ^10.1.0

flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true
  assets: 
    - assets/images/svgs/
  fonts:
    - family: JosefinSans
      fonts:
        - asset: assets/fonts/JosefinSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/JosefinSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/JosefinSans-Italic.ttf
          style: italic
          weight: 400
